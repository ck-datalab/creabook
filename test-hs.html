<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>Test HubSpot</title></head>
<body>
<h2>Test embed HubSpot — params identiques au site principal</h2>
<p id="status">Chargement...</p>
<div id="form-here"></div>

<script charset="utf-8" type="text/javascript" src="https://js-eu1.hsforms.net/forms/embed/v2.js"
  onerror="document.getElementById('status').textContent='ERREUR: script non charge';">
</script>
<script>
  document.getElementById('status').textContent = 'hbspt=' + (typeof hbspt);

  /* memes params que index.html */
  hbspt.forms.create({
    portalId: "26706563",
    formId:   "a2537a21-fc0c-4d78-9271-5bdd1e89fa72",
    region:   "eu1",
    locale:   "fr",
    target:   "#form-here",
    onFormReady: function($form) {
      document.getElementById('status').textContent = 'onFormReady OK!';
    },
    onFormSubmitted: function(form, data) {
      document.getElementById('status').textContent = 'soumis';
    }
  });

  setTimeout(function() {
    var s = document.getElementById('status');
    if (s && s.textContent.indexOf('onFormReady') === -1) {
      s.textContent = 'Apres 5s: onFormReady pas fire. #form-here innerHTML=' +
        document.getElementById('form-here').innerHTML.substring(0, 120);
    }
  }, 5000);
</script>
</body>
</html>
